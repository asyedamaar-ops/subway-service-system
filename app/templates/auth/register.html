{% extends "base.html" %}
{% block title %}Register — SubwaySSC{% endblock %}
{% block content %}
<div class="page-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🎫</div>
          <div class="section-title">Create Account</div>
          <div class="section-sub">Join SubwaySSC and travel smarter</div>
        </div>
        <div class="card">
          <div class="card-body">
            <form method="POST">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input type="text" name="username" class="form-control" placeholder="Syed Amaar" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Age</label>
                  <input type="number" name="age" class="form-control" placeholder="21" min="5" max="120">
                </div>
                <div class="col-12">
                  <label class="form-label">Email Address</label>
                  <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" name="phone" class="form-control" placeholder="+91 98765 43210">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Address</label>
                  <input type="text" name="address" class="form-control" placeholder="Chennai, TN">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Password</label>
                  <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account</button>
                </div>
              </div>
            </form>
            <div class="text-center mt-4" style="color:var(--text-muted);font-size:0.88rem">
              Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
