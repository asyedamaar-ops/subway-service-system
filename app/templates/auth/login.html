{% extends "base.html" %}
{% block title %}Login — SubwaySSC{% endblock %}
{% block content %}
<div class="page-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🚇</div>
          <div class="section-title">Welcome Back</div>
          <div class="section-sub">Sign in to your SubwaySSC account</div>
        </div>
        <div class="card">
          <div class="card-body">
            <form method="POST">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
              </div>
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="remember" id="remember"
                         style="accent-color:var(--accent)">
                  <label class="form-check-label" for="remember" style="color:var(--text-muted);font-size:0.88rem">
                    Remember me
                  </label>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In</button>
            </form>
            <div class="text-center mt-4" style="color:var(--text-muted);font-size:0.88rem">
              Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
            </div>
          </div>
        </div>
        <!-- Demo credentials hint -->
        <div class="card mt-3" style="background:var(--accent-glow);border-color:var(--accent)">
          <div class="card-body py-3">
            <div style="font-size:0.82rem;color:var(--text-muted)">
              <strong style="color:var(--accent)">Demo Credentials</strong><br>
              Admin: admin@subway.com / admin123<br>
              Passenger: demo@passenger.com / demo123
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
