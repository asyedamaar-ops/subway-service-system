{% extends "base.html" %}
{% block title %}My Profile — SubwaySSC{% endblock %}
{% block content %}
<div class="page-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="section-title">My Profile</div>
        <div class="section-sub">Update your personal information</div>
        <div class="card">
          <div class="card-body">
            <form method="POST">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Age</label>
                  <input type="number" name="age" class="form-control" value="{{ passenger.age if passenger else '' }}" min="5" max="120">
                </div>
                <div class="col-12">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" value="{{ current_user.email }}" disabled style="opacity:0.6">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone</label>
                  <input type="tel" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                </div>
                <div class="col-md-6">
                  <label class="form-label">ID / PIR No</label>
                  <input type="text" name="pir_no" class="form-control" value="{{ passenger.pir_no if passenger else '' }}" placeholder="Passport / Aadhar">
                </div>
                <div class="col-12">
                  <label class="form-label">Address</label>
                  <input type="text" name="address" class="form-control" value="{{ current_user.address or '' }}">
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <div class="text-center mt-3">
          <a href="{{ url_for('booking.my_bookings') }}" class="btn btn-outline-primary">View My Bookings</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
